<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/bootstrap-5.3.8/bootstrap-5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <header>
        <div class="container-fluid bg-primary py-5">
            <h2 class="fw-bold text-white px-3">Quản lý danh sách sản phẩm</h2>
            <small>
                <h6 class="text-white px-3 mt-3">Giao diện nhập liệu và hiển thị danh sách sản phẩm một cách trực quan, rõ ràng.</h6>
            </small>
        </div>
    </header>
    <main>
        <div class="container-fluid mt-5 d-flex gap-3">
            <div class="col-lg-4 border col-12">
                <div class="px-3 fw-bold mt-2">
                    <h3>Thêm sản phẩm mới</h3>
                    <div>
                        <small class="text-secondary">Nhập thông tin đầy đủ để thêm sản phẩm vào danh sách</small>
                    </div>
                </div>
                <div class="mt-5 px-3">
                    Tên sản phẩm
                    <div>
                        <form action="">
                            <input type="text" name="" id="" class="form-control mt-2" placeholder="Nhập tên sản phẩm">
                        </form>
                    </div>
                </div>
                <div class="px-3 mt-3">
                    Danh mục
                    <div>
                        <form action="">
                            <input type="text" name="" id="" class="form-control mt-2" placeholder="Chọn danh mục">
                        </form>
                    </div>
                </div>
                <div class="px-3 mt-3">
                    Giá
                    <div>
                        <form action="">
                            <input type="text" name="" id="" class="form-control mt-2" placeholder="Nhập giá">
                        </form>
                    </div>
                </div>
                <div class="px-3 mt-3">
                    Trạng thái còn hàng
                    <div>
                        <form action="">
                            <input type="text" name="" id="" class="form-control mt-2" placeholder="Còn hàng">
                        </form>
                    </div>
                </div>
                <div class="px-3 mt-3 mb-3">
                    <button class="btn btn-primary">Thêm sản phẩm</button>
                    <button class="btn btn-white">Làm mới form</button>
                </div>
            </div>
            
        </div>
    </main>
    <script></script>
</body>
</html>
